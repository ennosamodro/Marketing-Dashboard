<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trend Radar ID - Prediksi Tren Viral</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.7); }
      50% { box-shadow: 0 0 0 10px rgba(34, 211, 238, 0); }
    }
    .pulse-glow { animation: pulse-glow 2s infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white">
  <div id="app"></div>

  <script>
    // ============================================
    // TREND RADAR ID - All-in-one Dashboard
    // ============================================

    // Mock data - CUSTOMIZED untuk Lenno's businesses (Commerce, Beauty, F&B, Entertainment)
    const mockTrends = [
      // COMMERCE TRENDS
      { id: 1, term: 'Belanja Online Flash Sale', category: 'commerce', source: 'google_trends', momentum: 9.1, novelty: 6.2, searchVolume: 245000, change: '+48%', prediction: 'viral_yes', alert: true, content: 'Flash sale trends meningkat drastis — Panda Lovely opportunity' },
      { id: 2, term: 'Live Shopping Indonesia', category: 'commerce', source: 'tiktok', momentum: 8.7, novelty: 7.8, searchVolume: 189000, change: '+52%', prediction: 'viral_yes', alert: true, content: 'Live shopping format booming di Indonesia — creator kolaborasi' },
      { id: 3, term: 'Produk Kimia Rumahan', category: 'commerce', source: 'google_trends', momentum: 7.9, novelty: 5.4, searchVolume: 156000, change: '+35%', prediction: 'viral_likely', alert: true, content: 'DIY chemistry products trending — direct fit untuk Bromen' },
      { id: 4, term: 'B2B Marketplace Indonesia', category: 'commerce', source: 'instagram', momentum: 7.2, novelty: 6.1, searchVolume: 98000, change: '+28%', prediction: 'viral_likely', alert: false, content: 'Bisnis ke bisnis platform gaining traction untuk distributor' },

      // BEAUTY TRENDS
      { id: 5, term: 'Clean Beauty Movement', category: 'beauty', source: 'instagram', momentum: 8.4, novelty: 7.5, searchVolume: 167000, change: '+44%', prediction: 'viral_yes', alert: true, content: 'Natural beauty products trending — sustainable angle populer' },
      { id: 6, term: 'Skincare Routine Challenge', category: 'beauty', source: 'tiktok', momentum: 8.2, novelty: 8.1, searchVolume: 134000, change: '+39%', prediction: 'viral_yes', alert: true, content: 'Viral skincare challenges — content creation opportunity' },
      { id: 7, term: 'Korean Beauty Indonesia', category: 'beauty', source: 'instagram', momentum: 7.6, novelty: 6.3, searchVolume: 112000, change: '+31%', prediction: 'viral_likely', alert: false, content: 'K-beauty products trending strong di pasar Indonesia' },

      // F&B TRENDS (Sirtanio)
      { id: 8, term: 'Cloud Kitchen Delivery', category: 'fnb', source: 'google_trends', momentum: 8.8, novelty: 7.2, searchVolume: 198000, change: '+51%', prediction: 'viral_yes', alert: true, content: 'Ghost kitchen + delivery model meledak — Sirtanio positioning' },
      { id: 9, term: 'Healthy Fast Food', category: 'fnb', source: 'tiktok', momentum: 8.5, novelty: 7.6, searchVolume: 145000, change: '+42%', prediction: 'viral_yes', alert: true, content: 'Healthy meal prep viral — F&B market transformation' },
      { id: 10, term: 'Warung Makan Digital', category: 'fnb', source: 'instagram', momentum: 7.8, novelty: 6.8, searchVolume: 121000, change: '+35%', prediction: 'viral_likely', alert: true, content: 'Traditional food x digital platform — hybrid model trending' },
      { id: 11, term: 'Food Packaging Eco', category: 'fnb', source: 'google_trends', momentum: 7.4, novelty: 6.9, searchVolume: 89000, change: '+26%', prediction: 'viral_likely', alert: false, content: 'Sustainable packaging untuk F&B — consumer concern rising' },

      // ENTERTAINMENT/CONTENT TRENDS
      { id: 12, term: 'Creator Kolaborasi Indonesia', category: 'entertainment', source: 'youtube', momentum: 8.6, novelty: 7.4, searchVolume: 167000, change: '+46%', prediction: 'viral_yes', alert: true, content: 'Creator collaborations viral — content team opportunity' },
      { id: 13, term: 'Short-form Content Dominasi', category: 'entertainment', source: 'tiktok', momentum: 8.9, novelty: 8.2, searchVolume: 203000, change: '+49%', prediction: 'viral_yes', alert: true, content: 'Shorts/Reels format mengalahkan long-form — content strategy shift' },
      { id: 14, term: 'Meme Lokal Indonesia', category: 'entertainment', source: 'reddit', momentum: 8.3, novelty: 8.7, searchVolume: 145000, change: '+38%', prediction: 'viral_yes', alert: true, content: 'Local meme culture booming — humor relatability tinggi' },
      { id: 15, term: 'Podcast Indonesia Tumbuh', category: 'entertainment', source: 'spotify', momentum: 7.5, novelty: 6.8, searchVolume: 98000, change: '+29%', prediction: 'viral_likely', alert: false, content: 'Podcast format gaining audience — new content medium' },
    ];

    // State
    let state = {
      trends: mockTrends,
      selectedCategory: 'all',
      sortBy: 'momentum',
      lastUpdate: new Date(),
      autoRefresh: true
    };

    // Category labels
    const categoryLabels = {
      all: 'Semua',
      tech: 'Tech',
      fashion: 'Fashion',
      commerce: 'Bisnis',
      entertainment: 'Entertainment',
      beauty: 'Beauty',
      fnb: 'F&B',
      news: 'Berita'
    };

    const predictionColors = {
      'viral_yes': 'from-red-500 to-pink-500',
      'viral_likely': 'from-orange-500 to-amber-500',
      'viral_maybe': 'from-blue-500 to-cyan-500'
    };

    const predictionLabels = {
      'viral_yes': '🔥 Akan Viral',
      'viral_likely': '⚡ Mungkin Viral',
      'viral_maybe': '💭 Masih Monitor'
    };

    // Filter & sort logic
    function getFilteredTrends() {
      let result = [...state.trends];
      
      if (state.selectedCategory !== 'all') {
        result = result.filter(t => t.category === state.selectedCategory);
      }
      
      result.sort((a, b) => {
        switch(state.sortBy) {
          case 'momentum': return b.momentum - a.momentum;
          case 'novelty': return b.novelty - a.novelty;
          case 'volume': return b.searchVolume - a.searchVolume;
          case 'prediction': {
            const order = { 'viral_yes': 3, 'viral_likely': 2, 'viral_maybe': 1 };
            return (order[b.prediction] || 0) - (order[a.prediction] || 0);
          }
          default: return 0;
        }
      });
      
      return result;
    }

    // Render function
    function render() {
      const filtered = getFilteredTrends();
      const categories = ['all', 'commerce', 'beauty', 'fnb', 'entertainment', 'tech', 'fashion'];
      
      const html = `
        <div class="min-h-screen p-6">
          <div class="max-w-7xl mx-auto mb-8">
            <!-- Header -->
            <div class="flex items-center justify-between mb-6">
              <div class="flex items-center gap-3">
                <div class="p-3 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                  </svg>
                </div>
                <div>
                  <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">Trend Radar ID</h1>
                  <p class="text-sm text-slate-400">Prediksi tren viral sebelum meledak</p>
                </div>
              </div>
              <div class="text-right">
                <p class="text-xs text-slate-500">Last update</p>
                <p class="text-sm font-mono text-cyan-400">${state.lastUpdate.toLocaleTimeString('id-ID')}</p>
              </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-wrap gap-4 items-center">
              <!-- Category Filter -->
              <div class="flex gap-2 flex-wrap">
                ${categories.map(cat => `
                  <button
                    onclick="updateState({selectedCategory: '${cat}'})"
                    class="px-4 py-2 rounded-lg transition-all text-sm font-medium ${
                      state.selectedCategory === cat
                        ? 'bg-gradient-to-r from-cyan-500 to-blue-600 text-white shadow-lg shadow-cyan-500/50'
                        : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                    }"
                  >
                    ${categoryLabels[cat]}
                  </button>
                `).join('')}
              </div>

              <!-- Sort Dropdown -->
              <select
                onchange="updateState({sortBy: this.value})"
                class="px-4 py-2 bg-slate-700 rounded-lg text-sm border border-slate-600 hover:border-cyan-500 focus:outline-none focus:border-cyan-500 cursor-pointer"
              >
                <option value="momentum" ${state.sortBy === 'momentum' ? 'selected' : ''}>Sortir: Momentum</option>
                <option value="novelty" ${state.sortBy === 'novelty' ? 'selected' : ''}>Sortir: Novelty</option>
                <option value="volume" ${state.sortBy === 'volume' ? 'selected' : ''}>Sortir: Volume</option>
                <option value="prediction" ${state.sortBy === 'prediction' ? 'selected' : ''}>Sortir: Prediksi</option>
              </select>

              <!-- Auto-refresh toggle -->
              <button
                onclick="updateState({autoRefresh: !state.autoRefresh})"
                class="p-2 rounded-lg transition-all ${state.autoRefresh ? 'bg-green-600 text-white' : 'bg-slate-700 text-slate-400'}"
                title="Auto-refresh setiap jam"
              >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
              </button>
            </div>
          </div>

          <!-- Main Grid -->
          <div class="max-w-7xl mx-auto grid gap-4">
            ${filtered.map(trend => `
              <div class="group relative bg-slate-800/50 backdrop-blur border border-slate-700 hover:border-cyan-500/50 rounded-xl p-5 transition-all hover:shadow-lg hover:shadow-cyan-500/20 hover:-translate-y-1">
                <!-- Alert badge -->
                ${trend.alert ? `
                  <div class="absolute top-3 right-3">
                    <div class="relative">
                      <div class="absolute inset-0 bg-red-500 rounded-full animate-pulse opacity-50"></div>
                      <div class="relative bg-red-500 p-2 rounded-full">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                          <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                        </svg>
                      </div>
                    </div>
                  </div>
                ` : ''}

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <!-- Left: Trend Info -->
                  <div class="md:col-span-1">
                    <div class="flex items-start gap-2 mb-3">
                      <svg class="w-5 h-5 text-cyan-400 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8L5.257 19.236A4 4 0 005 15.25V5a2 2 0 012-2h10a2 2 0 012 2z"></path>
                      </svg>
                      <div>
                        <h3 class="text-lg font-bold text-white group-hover:text-cyan-400 transition-colors">${trend.term}</h3>
                        <p class="text-xs text-slate-400 mt-1">${trend.source.replace(/_/g, ' ').toUpperCase()}</p>
                      </div>
                    </div>
                    <p class="text-sm text-slate-400 leading-relaxed">${trend.content}</p>
                  </div>

                  <!-- Center: Metrics -->
                  <div class="md:col-span-1">
                    <div class="space-y-3">
                      <!-- Momentum -->
                      <div>
                        <div class="flex justify-between items-center mb-1">
                          <span class="text-xs font-semibold text-slate-400">MOMENTUM</span>
                          <span class="text-sm font-bold text-cyan-400">${trend.momentum.toFixed(1)}</span>
                        </div>
                        <div class="h-2 bg-slate-700 rounded-full overflow-hidden">
                          <div
                            class="h-full bg-gradient-to-r from-cyan-500 to-blue-500 transition-all"
                            style="width: ${(trend.momentum / 10) * 100}%"
                          ></div>
                        </div>
                      </div>

                      <!-- Novelty -->
                      <div>
                        <div class="flex justify-between items-center mb-1">
                          <span class="text-xs font-semibold text-slate-400">NOVELTY</span>
                          <span class="text-sm font-bold text-purple-400">${trend.novelty.toFixed(1)}</span>
                        </div>
                        <div class="h-2 bg-slate-700 rounded-full overflow-hidden">
                          <div
                            class="h-full bg-gradient-to-r from-purple-500 to-pink-500 transition-all"
                            style="width: ${(trend.novelty / 10) * 100}%"
                          ></div>
                        </div>
                      </div>

                      <!-- Change -->
                      <div class="pt-2 border-t border-slate-700">
                        <p class="text-xs text-slate-400">Volume Change</p>
                        <p class="text-lg font-bold text-green-400">${trend.change}</p>
                      </div>
                    </div>
                  </div>

                  <!-- Right: Prediction -->
                  <div class="md:col-span-1 flex flex-col justify-between">
                    <div class="bg-gradient-to-br ${predictionColors[trend.prediction]} p-4 rounded-lg shadow-lg">
                      <p class="text-xs font-semibold text-white/80 mb-1">PREDIKSI</p>
                      <p class="text-lg font-bold text-white">${predictionLabels[trend.prediction]}</p>
                    </div>
                    
                    <div class="mt-3 text-xs text-slate-400">
                      <p>Search Vol: <span class="font-mono text-cyan-400">${(trend.searchVolume / 1000).toFixed(0)}K</span></p>
                    </div>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>

          <!-- Footer -->
          <div class="max-w-7xl mx-auto mt-12 p-4 bg-slate-800/50 rounded-lg border border-slate-700 text-xs text-slate-400">
            <p>
              📊 <strong>Monitoring:</strong> Google Trends (ID) | TikTok | Twitter/X | Reddit | News APIs
              <br/>
              🔄 <strong>Status:</strong> Proof of Concept (Mock Data) | Next: Real data via GitHub Actions
              <br/>
              🎯 <strong>Scoring:</strong> Momentum (growth rate) + Novelty (newness) + Volume
            </p>
          </div>
        </div>
      `;

      document.getElementById('app').innerHTML = html;
    }

    // Update state & re-render
    function updateState(updates) {
      state = { ...state, ...updates };
      render();
    }

    // Manual refresh
    function manualRefresh() {
      state.lastUpdate = new Date();
      render();
    }

    // Initial render
    render();

    // Auto-refresh simulation (every hour)
    setInterval(() => {
      if (state.autoRefresh) {
        state.lastUpdate = new Date();
        // Simulate momentum updates
        state.trends = state.trends.map(t => ({
          ...t,
          momentum: Math.max(3, Math.min(10, t.momentum + (Math.random() - 0.5) * 0.5))
        }));
        render();
      }
    }, 3600000); // 1 hour
  </script>
</body>
</html>
